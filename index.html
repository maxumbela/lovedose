<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020202">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Love Portal">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>Fixed Ethnocentric Particle Animation</title>
    <!-- Import the Ethnocentric font -->
    <link href="https://fonts.cdnfonts.com/css/ethnocentric" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            background-color: #020202;
            overflow: hidden;
            font-family: 'Ethnocentric', sans-serif;
            touch-action: none;
        }

        /* HIDDEN ELEMENT: This forces the browser to download the font immediately */
        #font-loader {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            font-family: 'Ethnocentric', sans-serif;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100dvh;
            background:
                radial-gradient(circle at center, rgba(255, 40, 120, 0.08), transparent 32%),
                radial-gradient(circle at 50% 100%, rgba(0, 180, 255, 0.06), transparent 38%),
                #020202;
        }

        .ui-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        @keyframes rgb-border {
            0% { border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
            17% { border-color: #ffff00; box-shadow: 0 0 20px rgba(255, 255, 0, 0.4); }
            33% { border-color: #00ff00; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); }
            50% { border-color: #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
            66% { border-color: #0000ff; box-shadow: 0 0 20px rgba(0, 0, 255, 0.4); }
            83% { border-color: #ff00ff; box-shadow: 0 0 20px rgba(255, 0, 255, 0.4); }
            100% { border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
        }

        #textInput {
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            border: 2px solid #ff0000;
            background: rgba(10, 10, 10, 0.7);
            color: #ffffff;
            font-size: 16px;
            font-family: 'Ethnocentric', sans-serif;
            text-align: center;
            outline: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: rgb-border 6s infinite linear;
            transition: background 0.3s ease;
            letter-spacing: 1px;
        }

        #textInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Segoe UI', sans-serif; /* Standard font for placeholder to remain readable */
        }

        #textInput:focus {
            background: rgba(20, 20, 20, 0.9);
        }
        
        #particleCount {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif; /* Better for numbers */
            pointer-events: none;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            animation: rgb-text 6s infinite linear;
        }

        @keyframes rgb-text {
            0% { color: #ff5555; }
            33% { color: #55ff55; }
            66% { color: #5555ff; }
            100% { color: #ff5555; }
        }
        
        #loadingMsg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            font-family: 'Ethnocentric', sans-serif;
            opacity: 1;
            transition: opacity 0.5s;
            pointer-events: none;
            text-align: center;
        }

        #topHud {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            background: rgba(6, 6, 6, 0.56);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        }

        #sensitivityLabel {
            color: rgba(255, 255, 255, 0.82);
            font-size: 12px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #sensitivityControl {
            width: min(34vw, 180px);
            accent-color: #ff4d88;
        }

        #beatDot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff5b8f;
            box-shadow: 0 0 0 rgba(255, 91, 143, 0.45);
            transition: transform 0.08s linear, box-shadow 0.08s linear, background 0.12s linear;
        }

        #fullscreenHint {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 999px;
            padding: 10px 16px;
            background: rgba(8, 8, 8, 0.7);
            color: #ffffff;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        #fullscreenHint[data-mode="install"] {
            left: 50%;
            right: auto;
            bottom: 20px;
            top: auto;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        #audioStatus {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            max-width: min(92vw, 760px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            padding: 12px 18px;
            background: rgba(6, 6, 6, 0.7);
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>

    <!-- Hidden div to force font download -->
    <div id="font-loader">Loading Ethnocentric Font...</div>

    <canvas id="canvas"></canvas>
    
    <div id="particleCount">Particles: 0</div>
    <div id="loadingMsg">Loading Font...</div>
    <div id="audioStatus">Starting sound-reactive mode...</div>
    <div id="topHud">
        <span id="sensitivityLabel">Audio</span>
        <input id="sensitivityControl" type="range" min="0.5" max="2.5" step="0.1" value="1.3">
        <span id="beatDot"></span>
    </div>
    <button id="fullscreenHint" type="button" hidden>Tap for full screen</button>

    <div class="ui-container">
        <input type="text" id="textInput" placeholder="Type a message..." autocomplete="off" spellcheck="false">
    </div>

    <script>
        // Wait for the window to load, then programmatically ensure the font is ready
        window.onload = async function() {
            const loadingMsg = document.getElementById('loadingMsg');
            
            // Force the browser to wait until Ethnocentric is downloaded
            try {
                await document.fonts.load('16px "Ethnocentric"');
                console.log("Font loaded successfully!");
            } catch (error) {
                console.warn("Font loading timeout, starting anyway.");
            }
            
            loadingMsg.style.opacity = '0'; // Hide loading message

            // --- Engine Initialization ---
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { alpha: false }); 
            const textInput = document.getElementById('textInput');
            const countDisplay = document.getElementById('particleCount');
            const fullscreenHint = document.getElementById('fullscreenHint');
            const audioStatus = document.getElementById('audioStatus');
            const sensitivityControl = document.getElementById('sensitivityControl');
            const beatDot = document.getElementById('beatDot');

            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

            let particles = [];
            let globalHue = 0;
            const globalHueSpeed = 1.5; 
            const shouldAutoFullscreen = new URLSearchParams(window.location.search).get('autofs') === '1';
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            let deferredInstallPrompt = null;
            let audioContext = null;
            let analyser = null;
            let frequencyData = null;
            let audioEnergy = 0;
            let bassEnergy = 0;
            let audioPulse = 0;
            let shapeCenter = { x: 0, y: 0 };
            let audioSensitivity = parseFloat(sensitivityControl.value);
            let glowPulse = 0;
            
            const mouse = { x: null, y: null, radius: 58 };

            // Slightly reduced density keeps the final shape cleaner and more readable.
            let pixelGap = 2; 

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                offCanvas.width = window.innerWidth;
                offCanvas.height = window.innerHeight;
                mouse.radius = Math.max(42, Math.min(72, Math.min(window.innerWidth, window.innerHeight) * 0.06));
                refreshLayout();
            }

            window.addEventListener('resize', resize);

            window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
            window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
            window.addEventListener('touchstart', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
            window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
            window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });
            sensitivityControl.addEventListener('input', () => {
                audioSensitivity = parseFloat(sensitivityControl.value);
            });

            async function requestFullscreenIfPossible() {
                const root = document.documentElement;
                const request = root.requestFullscreen || root.webkitRequestFullscreen || root.msRequestFullscreen;

                if (!request || document.fullscreenElement || isStandalone) return false;

                try {
                    await request.call(root);
                    fullscreenHint.hidden = true;
                    return true;
                } catch (error) {
                    return false;
                }
            }

            function showInstallHint() {
                if (!isMobile || isStandalone) return;
                fullscreenHint.dataset.mode = 'install';
                fullscreenHint.textContent = deferredInstallPrompt ? 'Install app for full screen' : 'Add to Home Screen for full screen';
                fullscreenHint.hidden = false;
            }

            function bindFullscreenAssist() {
                if (!shouldAutoFullscreen) return;

                const tryFullscreen = async () => {
                    const ok = await requestFullscreenIfPossible();
                    if (ok) {
                        fullscreenHint.hidden = true;
                        window.removeEventListener('pointerdown', tryFullscreen);
                        window.removeEventListener('touchstart', tryFullscreen);
                        window.removeEventListener('keydown', tryFullscreen);
                        window.removeEventListener('click', tryFullscreen);
                    } else {
                        showInstallHint();
                    }
                };

                fullscreenHint.addEventListener('click', async () => {
                    if (fullscreenHint.dataset.mode === 'install' && deferredInstallPrompt) {
                        deferredInstallPrompt.prompt();
                        await deferredInstallPrompt.userChoice.catch(() => null);
                        deferredInstallPrompt = null;
                        showInstallHint();
                        return;
                    }

                    await tryFullscreen();
                });
                window.addEventListener('pointerdown', tryFullscreen, { once: true });
                window.addEventListener('touchstart', tryFullscreen, { once: true });
                window.addEventListener('click', tryFullscreen, { once: true });
                window.addEventListener('keydown', tryFullscreen, { once: true });
                window.addEventListener('pageshow', () => requestFullscreenIfPossible());
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) requestFullscreenIfPossible();
                });
                requestFullscreenIfPossible().then((ok) => {
                    fullscreenHint.hidden = ok;
                    if (!ok) showInstallHint();
                });
            }

            window.addEventListener('beforeinstallprompt', (event) => {
                event.preventDefault();
                deferredInstallPrompt = event;
                if (shouldAutoFullscreen) {
                    showInstallHint();
                }
            });

            window.addEventListener('appinstalled', () => {
                deferredInstallPrompt = null;
                fullscreenHint.hidden = true;
            });

            function setAudioStatus(message) {
                audioStatus.textContent = message;
            }

            function updateAudioReactiveData() {
                if (!analyser || !frequencyData) {
                    audioEnergy *= 0.94;
                    bassEnergy *= 0.92;
                    audioPulse *= 0.94;
                    return;
                }

                analyser.getByteFrequencyData(frequencyData);

                let total = 0;
                let bassTotal = 0;
                const bassBins = Math.max(4, Math.floor(frequencyData.length * 0.08));

                for (let i = 0; i < frequencyData.length; i++) {
                    total += frequencyData[i];
                    if (i < bassBins) bassTotal += frequencyData[i];
                }

                const normalizedTotal = total / (frequencyData.length * 255);
                const normalizedBass = bassTotal / (bassBins * 255);

                audioEnergy = audioEnergy * 0.84 + (normalizedTotal * audioSensitivity) * 0.16;
                bassEnergy = bassEnergy * 0.82 + (normalizedBass * audioSensitivity) * 0.18;
                audioPulse = Math.min(1, normalizedBass * audioSensitivity + normalizedTotal * 0.22);
                glowPulse = glowPulse * 0.82 + audioPulse * 0.18;
                beatDot.style.transform = `scale(${1 + glowPulse * 1.8})`;
                beatDot.style.boxShadow = `0 0 ${8 + glowPulse * 28}px rgba(255, 91, 143, ${0.2 + glowPulse * 0.45})`;
                beatDot.style.background = `hsl(${340 - glowPulse * 35}, 100%, ${60 + glowPulse * 10}%)`;
            }

            async function enableMicrophoneReactiveMode() {
                if (!navigator.mediaDevices?.getUserMedia) {
                    setAudioStatus('Microphone detection is not supported in this browser.');
                    return;
                }

                const isSecureOrigin = window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                if (!isSecureOrigin) {
                    setAudioStatus('Microphone works on https or localhost only. Open this page on localhost for live sound reaction.');
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    });

                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContextClass();

                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }

                    const source = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    analyser.smoothingTimeConstant = 0.72;
                    frequencyData = new Uint8Array(analyser.frequencyBinCount);
                    source.connect(analyser);

                    setAudioStatus('Microphone connected. Particles now react to music and ambient sound.');
                } catch (error) {
                    setAudioStatus('Microphone permission was blocked or unavailable. Sound-reactive mode is off.');
                }
            }

            class Particle {
                constructor(x, y) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.originX = x;
                    this.originY = y;
                    
                    this.size = Math.random() < 0.5 ? 1 : 2; 
                    this.vx = 0;
                    this.vy = 0;
                    this.ease = Math.random() * 0.018 + 0.09;     
                    this.friction = Math.random() * 0.025 + 0.905; 
                    this.pushForce = Math.random() * 1.1 + 0.95;      
                    
                    this.angle = Math.random() * Math.PI * 2;
                    this.shimmerSpeed = Math.random() * 0.03 + 0.01;
                    this.shimmerRadius = Math.random() * 1.5 + 0.4; 
                    this.offset = Math.random() * Math.PI * 2;
                    
                    this.active = true;
                }

                update() {
                    if (!this.active) return;

                    this.angle += this.shimmerSpeed;
                    const centerDx = this.originX - shapeCenter.x;
                    const centerDy = this.originY - shapeCenter.y;
                    const centerDistance = Math.max(1, Math.sqrt(centerDx * centerDx + centerDy * centerDy));
                    const radialX = centerDx / centerDistance;
                    const radialY = centerDy / centerDistance;

                    const pulseAmount = bassEnergy * 10 + audioEnergy * 4;
                    const ripple = Math.sin(this.angle * 1.8 + this.offset + globalHue * 0.02) * pulseAmount;
                    const shimmerX = Math.cos(this.angle + this.offset) * this.shimmerRadius;
                    const shimmerY = Math.sin(this.angle + this.offset) * this.shimmerRadius;

                    let targetX = this.originX + shimmerX + radialX * ripple;
                    let targetY = this.originY + shimmerY + radialY * ripple;

                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (mouse.x !== null && distance < mouse.radius) {
                        const safeDistance = Math.max(distance, 0.001);
                        const normalized = 1 - (safeDistance / mouse.radius);
                        const force = normalized * normalized;
                        const awayX = dx / safeDistance;
                        const awayY = dy / safeDistance;
                        const swirlX = -awayY;
                        const swirlY = awayX;

                        this.vx -= awayX * force * this.pushForce * 1.55;
                        this.vy -= awayY * force * this.pushForce * 1.55;
                        this.vx += swirlX * force * 0.32;
                        this.vy += swirlY * force * 0.32;
                    }

                    const returnEase = mouse.x !== null ? this.ease * 1.5 : this.ease;
                    this.vx += (targetX - this.x) * returnEase;
                    this.vy += (targetY - this.y) * returnEase;

                    this.vx *= this.friction;
                    this.vy *= this.friction;

                    const maxSpeed = 3.7 + audioPulse * 1.2;
                    this.vx = Math.max(-maxSpeed, Math.min(maxSpeed, this.vx));
                    this.vy = Math.max(-maxSpeed, Math.min(maxSpeed, this.vy));

                    this.x += this.vx;
                    this.y += this.vy;
                }

                draw() {
                    if (!this.active) return;
                    ctx.shadowBlur = 4 + glowPulse * 10;
                    ctx.shadowColor = `hsla(${Math.floor(globalHue)}, 100%, 65%, ${0.24 + glowPulse * 0.3})`;
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                }
            }

            function getPixelCoordinates() {
                const coords = [];
                const imageData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height).data;
                
                for (let y = 0; y < offCanvas.height; y += pixelGap) {
                    for (let x = 0; x < offCanvas.width; x += pixelGap) {
                        const index = (y * offCanvas.width + x) * 4;
                        const alpha = imageData[index + 3];
                        
                        if (alpha > 128) {
                            coords.push({ x, y });
                        }
                    }
                }
                return coords;
            }

            function createHeartCoordinates() {
                offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
                offCtx.fillStyle = '#ffffff';
                
                let w = Math.min(offCanvas.width, offCanvas.height) * 0.45;
                let h = w;
                let x = offCanvas.width / 2;
                let y = offCanvas.height / 2 - h / 5;

                offCtx.beginPath();
                const topCurveHeight = h * 0.3;
                offCtx.moveTo(x, y + topCurveHeight);
                offCtx.bezierCurveTo(x, y, x - w / 2, y, x - w / 2, y + topCurveHeight);
                offCtx.bezierCurveTo(x - w / 2, y + (h + topCurveHeight) / 2, x, y + (h + topCurveHeight) / 2, x, y + h);
                offCtx.bezierCurveTo(x, y + (h + topCurveHeight) / 2, x + w / 2, y + (h + topCurveHeight) / 2, x + w / 2, y + topCurveHeight);
                offCtx.bezierCurveTo(x + w / 2, y, x, y, x, y + topCurveHeight);
                offCtx.fill();

                return getPixelCoordinates();
            }

            // Enhanced Text Layout for Mobile screens
            function createTextCoordinates(text) {
                offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
                offCtx.fillStyle = '#ffffff';
                offCtx.textAlign = 'center';
                offCtx.textBaseline = 'middle';

                // Fixed: Start with a much larger font size so mobile gets more particles
                let maxWidth = offCanvas.width * 0.9; 
                let fontSize = window.innerWidth < 768 ? 120 : 180;
                
                offCtx.font = `${fontSize}px "Ethnocentric", sans-serif`;
                
                // Measure the text. If it is wider than the screen, shrink it down to fit perfectly.
                let metrics = offCtx.measureText(text);
                if (metrics.width > maxWidth) {
                    let scaleRatio = maxWidth / metrics.width;
                    fontSize = fontSize * scaleRatio;
                }
                
                // Apply the final calculated font size
                offCtx.font = `${fontSize}px "Ethnocentric", sans-serif`;

                // Calculate vertical position (shifted up slightly to avoid UI overlap)
                let startY = (offCanvas.height / 2) - 40; 
                offCtx.fillText(text, offCanvas.width / 2, startY);
                
                return getPixelCoordinates();
            }

            function updateParticles(newCoords) {
                newCoords.sort((a, b) => (a.y - b.y) || (a.x - b.x));

                if (newCoords.length > 0) {
                    let sumX = 0;
                    let sumY = 0;

                    for (let i = 0; i < newCoords.length; i++) {
                        sumX += newCoords[i].x;
                        sumY += newCoords[i].y;
                    }

                    shapeCenter = {
                        x: sumX / newCoords.length,
                        y: sumY / newCoords.length
                    };
                }

                for (let i = 0; i < newCoords.length; i++) {
                    if (i < particles.length) {
                        particles[i].originX = newCoords[i].x;
                        particles[i].originY = newCoords[i].y;
                        particles[i].active = true;
                    } else {
                        particles.push(new Particle(newCoords[i].x, newCoords[i].y));
                    }
                }

                if (particles.length > newCoords.length) {
                    for (let i = newCoords.length; i < particles.length; i++) {
                        particles[i].active = false; 
                    }
                }
                
                particles = particles.filter(p => p.active);
                countDisplay.innerText = `Particles: ${particles.length.toLocaleString()}`;
            }

            function refreshLayout() {
                const text = textInput.value.replace(/\s+/g, ' ').trim(); 
                if (text === "") {
                    updateParticles(createHeartCoordinates());
                } else {
                    updateParticles(createTextCoordinates(text));
                }
            }

            textInput.addEventListener('input', refreshLayout);

            function animate() {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = `rgba(2, 2, 2, ${0.26 + (1 - glowPulse) * 0.18})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.globalCompositeOperation = 'lighter';

                updateAudioReactiveData();

                globalHue += globalHueSpeed + audioPulse * 3;
                if (globalHue >= 360) globalHue = 0;

                const lightness = 55 + audioPulse * 10;
                ctx.fillStyle = `hsl(${Math.floor(globalHue)}, 100%, ${lightness}%)`;

                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }

                ctx.shadowBlur = 0;

                if (audioPulse > 0.08) {
                    const ringRadius = 20 + audioPulse * Math.min(canvas.width, canvas.height) * 0.12;
                    ctx.globalCompositeOperation = 'screen';
                    ctx.beginPath();
                    ctx.arc(shapeCenter.x, shapeCenter.y, ringRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${Math.floor(globalHue + 20)}, 100%, 70%, ${0.08 + audioPulse * 0.14})`;
                    ctx.lineWidth = 1 + audioPulse * 2.5;
                    ctx.stroke();
                }

                requestAnimationFrame(animate);
            }

            // Start the engine only after the font is confirmed ready
            resize();
            bindFullscreenAssist();
            enableMicrophoneReactiveMode();
            animate();
        };
    </script>
</body>
</html>
